<script>
// ===================================================================================
//
//      GOOGLE APPS SCRIPT BACKEND (HYBRID FAST v5.8 - Report User Fetching)
//
// ===================================================================================

// ⚙️ Cấu hình
var SPREADSHEET_ID = PropertiesService.getScriptProperties().getProperty('SPREADSHEET_ID');
var FOLDER_ID = PropertiesService.getScriptProperties().getProperty('FOLDER_ID');
if (!SPREADSHEET_ID || !FOLDER_ID)
  throw new Error("Thiếu cấu hình SPREADSHEET_ID hoặc FOLDER_ID trong Script Properties.");

// Các đối tượng chính
var ss = SpreadsheetApp.openById(SPREADSHEET_ID);
var userSheet = ss.getSheetByName("Users");
var certSheet = ss.getSheetByName("Certificates");
var titleSheet = ss.getSheetByName("ChucDanh");
var settingsSheet = ss.getSheetByName("Settings");
var reportSheet = ss.getSheetByName("Reports");
var driveFolder = DriveApp.getFolderById(FOLDER_ID);

// ===================================================================================
// 🧩 HÀM TIỆN ÍCH
// ===================================================================================
function normalizeHeaders(headers) {
  return headers.map(h => String(h || "").trim().toLowerCase().replace(/\s+/g, ""));
}
function extractGoogleDriveId(urlOrId) {
  if (!urlOrId || typeof urlOrId !== 'string') return null;
  if (/^[a-zA-Z0-9_-]{25,}/.test(urlOrId)) return urlOrId;
  var m = urlOrId.match(/[-\w]{25,}/);
  return m ? m[0] : null;
}

function sheetToObjects(sheet) {
  if (!sheet) return [];
  const lastRow = sheet.getLastRow(), lastCol = sheet.getLastColumn();
  if (lastRow < 2) return [];
  const headers = normalizeHeaders(sheet.getRange(1, 1, 1, lastCol).getValues()[0]);
  const data = sheet.getRange(2, 1, lastRow - 1, lastCol).getValues();
  return data.map(r => {
    const o = {};
    headers.forEach((h, i) => o[h] = r[i]);
    return o;
  });
}

// ===================================================================================
// ⚡️ ĐỌC DỮ LIỆU NHANH (TÁCH BIỆT)
// ===================================================================================
function getInitialData() {
  const cache = CacheService.getScriptCache();
  const key = "dtlt_initial_data_v1";
  const cached = cache.get(key);
  if (cached) return JSON.parse(cached);

  Logger.log("🔄 Đọc dữ liệu ban đầu từ Sheet...");

  const users = sheetToObjects(userSheet);
  const titles = sheetToObjects(titleSheet);
  
  const safeUsers = users.map(u => {
    const safeUser = {...u};
    delete safeUser.password;
    return safeUser;
  });

  const out = {
    users: safeUsers,
    titles: titles || []
  };

  const s = JSON.stringify(out);
  if (s.length < 100 * 1024) cache.put(key, s, 300);
  return out;
}

function clearInitialCache() {
  CacheService.getScriptCache().remove("dtlt_initial_data_v1");
  CacheService.getScriptCache().remove("report_users_v1"); // Also clear report users cache
}

function getSettings() {
    let startYear;
    try {
        if (settingsSheet) {
            const value = settingsSheet.getRange("B1").getValue();
            if (value && !isNaN(parseInt(value, 10))) {
                startYear = parseInt(value, 10);
            }
        }
    } catch (err) {
        Logger.log("Không thể đọc 'Settings' sheet. Lỗi: " + err.message);
    }
    
    if (!startYear) {
        const currentYear = new Date().getFullYear();
        startYear = Math.floor((currentYear - 1) / 5) * 5 + 1;
    }

    return {
        complianceStartYear: startYear,
        googleSheetUrl: 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/edit',
        googleFolderUrl: 'https://drive.google.com/drive/folders/' + FOLDER_ID
    };
}


// ===================================================================================
// 📦 XỬ LÝ REQUEST (doGet, doPost)
// ===================================================================================
function doGet(e) {
  try {
    const data = getInitialData();
    const settings = getSettings();
    const combinedData = {...data, ...settings};
    
    return ContentService.createTextOutput(JSON.stringify({ success: true, data: combinedData }))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    Logger.log("Lỗi doGet: " + err.stack);
    return ContentService.createTextOutput(JSON.stringify({ success: false, message: err.message }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

function doPost(e) {
  try {
    const body = JSON.parse(e.postData.contents);
    const { action, payload } = body;
    let result;

    const actionHandlers = {
      'login': (p) => handleLogin(p.username, p.password),
      'fetchCertificates': handleFetchCertificates,
      'changePassword': handleChangePassword,
      'addUser': handleAddUser,
      'updateUser': handleUpdateUser,
      'deleteUser': (p) => handleDeleteUser(p.userId),
      'addCertificate': handleAddCertificate,
      'updateCertificate': handleUpdateCertificate,
      'deleteCertificate': handleDeleteCertificate,
      'updateCertificateOrientation': (p) => handleUpdateCertificateOrientation(p.id, p.orientation),
      'askAI': handleAskAI,
      'extractCertificateInfo': handleExtractCertificateInfo,
      'extractFromImageId': handleExtractFromImageId,
      'checkExtractionApiKey': (p) => handleCheckExtractionApiKey(p),
      'checkAssistantApiKey': handleCheckAssistantApiKey,
      'updateComplianceYear': handleUpdateComplianceYear,
      'createReport': handleCreateReport,
      'getReport': (p) => handleGetReport(p.id),
      'getUsersForReport': handleGetUsersForReport
    };

    if (actionHandlers[action]) {
      result = actionHandlers[action](payload);
    } else {
      throw new Error("Action không hợp lệ: " + action);
    }
    
    // Clear cache only on write operations for relevant data
    const writeActions = ['addUser', 'updateUser', 'deleteUser', 'changePassword', 'updateComplianceYear'];
    if (writeActions.includes(action)) {
      clearInitialCache();
    }

    return ContentService.createTextOutput(JSON.stringify({ success: true, data: result }))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    Logger.log("Lỗi doPost: " + err.stack);
    return ContentService.createTextOutput(JSON.stringify({ success: false, message: err.message }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

// ===================================================================================
// 👤 USER MANAGEMENT
// ===================================================================================
function handleLogin(username, password) {
  const users = sheetToObjects(userSheet);
  const user = users.find(u => u.username === username && String(u.password) === String(password));
  
  if (!user) {
    throw new Error("Tên đăng nhập hoặc mật khẩu không đúng.");
  }
  if (String(user['trạngthái']).trim() === 'Tạm ngừng') {
    throw new Error("Tài khoản bị tạm ngừng, vui lòng liên hệ quản trị viên.");
  }
  
  const safeUser = {...user};
  delete safeUser.password;
  
  // On successful login, return the user object AND the initial data payload
  const initialData = getInitialData();
  const settings = getSettings();
  
  return {
    loggedInUser: safeUser,
    ...initialData,
    ...settings
  };
}


function handleChangePassword(p){
  const {userId,oldPassword,newPassword}=p;
  const data=userSheet.getDataRange().getValues();
  const headers=normalizeHeaders(data[0]);
  const idCol=headers.indexOf('id'), passCol=headers.indexOf('password');
  const changedAt=headers.indexOf('passwordchangedat');
  const lock=LockService.getScriptLock();
  if(!lock.tryLock(3000)) throw new Error("Hệ thống bận, thử lại sau vài giây.");

  try{
    for(let i=1;i<data.length;i++){
      if(String(data[i][idCol])===String(userId)){
        if(String(data[i][passCol])!==String(oldPassword)) throw new Error("Mật khẩu cũ không đúng.");
        data[i][passCol]=String(newPassword).trim();
        if(changedAt>-1) data[i][changedAt]=new Date().toISOString();
        userSheet.getRange(i+1,1,1,data[i].length).setValues([data[i]]);
        return {message:"Đổi mật khẩu thành công."};
      }
    }
    throw new Error("Không tìm thấy người dùng.");
  }finally{ lock.releaseLock(); }
}

function handleAddUser(u){
  const lock=LockService.getScriptLock();
  if(!lock.tryLock(3000)) throw new Error("Hệ thống đang bận.");
  try{
    const headers=normalizeHeaders(userSheet.getRange(1,1,1,userSheet.getLastColumn()).getValues()[0]);
    const obj={...u};
    if(!obj.id) obj.id=Date.now();
    obj.password=obj.password||'123456';
    obj['trạngthái']=u.isSuspended?'Tạm ngừng':'Hoạt động';
    delete obj.isSuspended;
    const row=headers.map(h=>obj[h]||'');
    userSheet.appendRow(row);
    const safe={...obj}; delete safe.password; return safe;
  }finally{ lock.releaseLock(); }
}

function handleUpdateUser(u) {
  const lock = LockService.getScriptLock();
  if (!lock.tryLock(3000)) throw new Error("Hệ thống đang bận.");
  try {
    const data = userSheet.getDataRange().getValues();
    const headers = normalizeHeaders(data[0]);
    const idCol = headers.indexOf('id');

    // Create a version of the payload with normalized keys for easy lookup
    const normalizedPayload = {};
    for (const key in u) {
      if (Object.prototype.hasOwnProperty.call(u, key)) {
        normalizedPayload[key.toLowerCase().replace(/\s+/g, "")] = u[key];
      }
    }

    for (let i = 1; i < data.length; i++) {
      if (data[i][idCol] == u.id) { // Match by original ID from payload
        const row = data[i];
        
        headers.forEach((h, idx) => {
          // Use the normalized payload for comparison
          if (normalizedPayload[h] !== undefined) {
            // Skip updating password if it's empty
            if (h === 'password' && (normalizedPayload[h] === '' || normalizedPayload[h] === null)) {
              return;
            }
            row[idx] = normalizedPayload[h];
          }
        });

        // Special handling for 'isSuspended' which maps to 'trạngthái' column
        const statusCol = headers.indexOf('trạngthái');
        if (statusCol > -1 && normalizedPayload['issuspended'] !== undefined) {
          row[statusCol] = normalizedPayload['issuspended'] ? 'Tạm ngừng' : 'Hoạt động';
        }

        userSheet.getRange(i + 1, 1, 1, row.length).setValues([row]);
        const safe = { ...u };
        delete safe.password;
        return safe;
      }
    }
    throw new Error("Không tìm thấy người dùng.");
  } finally {
    lock.releaseLock();
  }
}


function handleDeleteUser(id){
  const lock=LockService.getScriptLock();
  if(!lock.tryLock(4000)) throw new Error("Hệ thống đang bận.");
  try{
    const data=userSheet.getDataRange().getValues();
    const headers=normalizeHeaders(data[0]);
    const idCol=headers.indexOf('id');
    for(let i=data.length-1;i>0;i--){
      if(data[i][idCol]==id) userSheet.deleteRow(i+1);
    }
    const cData=certSheet.getDataRange().getValues();
    const cHeaders=normalizeHeaders(cData[0]);
    const uCol=cHeaders.indexOf('userid');
    for(let j=cData.length-1;j>0;j--){
      if(cData[j][uCol]==id) certSheet.deleteRow(j+1);
    }
    return id;
  }finally{ lock.releaseLock(); }
}

// ===================================================================================
// 🎓 CERTIFICATE MANAGEMENT
// ===================================================================================
function handleFetchCertificates() {
  Logger.log("Fetching certificates...");
  return sheetToObjects(certSheet);
}

function ensureCertOrientationColumn() {
  const headers = normalizeHeaders(certSheet.getRange(1, 1, 1, certSheet.getLastColumn()).getValues()[0]);
  if (headers.indexOf('imageorientation') === -1) {
    Logger.log("⚠️ Cột 'ImageOrientation' không tồn tại. Đang tự động tạo...");
    certSheet.getRange(1, headers.length + 1).setValue('ImageOrientation');
    Logger.log("✅ Đã tạo thành công cột 'ImageOrientation'.");
  }
}

function handleAddCertificate(p){
  if (p.date && new Date(p.date).getFullYear() < 2021) {
    throw new Error("Ngày cấp không được trước năm 2021.");
  }
  const lock=LockService.getScriptLock();
  if(!lock.tryLock(4000)) throw new Error("Hệ thống đang bận.");
  try{
    ensureCertOrientationColumn();
    const blob=Utilities.newBlob(Utilities.base64Decode(p.imageBase64),p.imageType,p.imageName);
    const file=driveFolder.createFile(blob);
    const url=file.getUrl();
    const rec={id:p.id,userid:p.userId,name:p.name,date:p.date,credits:p.credits,image:url,updatedat:new Date().toISOString(), imageorientation: p.orientation || 1 };
    const headers=normalizeHeaders(certSheet.getRange(1,1,1,certSheet.getLastColumn()).getValues()[0]);
    const row=headers.map(h=>rec[h]||'');
    certSheet.appendRow(row);
    
    // Logging is now a fire-and-forget, not critical
    try {
        var logSheet = ss.getSheetByName("Log");
        logSheet.appendRow([new Date(), p.userId, p.userName, 'thêm', rec.id, rec.name, rec.image]);
    } catch (e) { Logger.log("Lỗi ghi log (non-critical): " + e.toString()); }

    return rec;
  }finally{ lock.releaseLock(); }
}

function handleUpdateCertificate(p){
  if (p.date && new Date(p.date).getFullYear() < 2021) {
    throw new Error("Ngày cấp không được trước năm 2021.");
  }
  const lock=LockService.getScriptLock();
  if(!lock.tryLock(4000)) throw new Error("Hệ thống đang bận.");
  try{
    ensureCertOrientationColumn();
    const data=certSheet.getDataRange().getValues();
    const headers=normalizeHeaders(data[0]);
    const idCol=headers.indexOf('id');
    const imgCol=headers.indexOf('image');
    const orientCol = headers.indexOf('imageorientation');
    let newUrl=null;
    if(p.newImageBase64){
      const blob=Utilities.newBlob(Utilities.base64Decode(p.newImageBase64),p.newImageType,p.newImageName);
      newUrl=driveFolder.createFile(blob).getUrl();
    }
    for(let i=1;i<data.length;i++){
      if(data[i][idCol]==p.id){
        const row=data[i];
        headers.forEach((h,idx)=>{
          if(p[h]!==undefined) row[idx]=p[h];
        });
        if(newUrl && imgCol>-1) row[imgCol]=newUrl;
        if(newUrl && orientCol > -1) row[orientCol] = p.orientation || 1;
        certSheet.getRange(i+1,1,1,row.length).setValues([row]);
        
        if (p.modifiedByUserId) {
            try {
              var logSheet = ss.getSheetByName("Log");
              logSheet.appendRow([new Date(), p.modifiedByUserId, "N/A", 'sửa', p.id, p.name, newUrl || p.image]);
            } catch (e) { Logger.log("Lỗi ghi log (non-critical): " + e.toString()); }
        }
        
        return {...p,image:newUrl||p.image, imageorientation: p.orientation || 1};
      }
    }
    throw new Error("Không tìm thấy chứng chỉ.");
  }finally{ lock.releaseLock(); }
}

function handleDeleteCertificate(p){
  const { id, modifiedByUserId } = p;
  const lock=LockService.getScriptLock();
  if(!lock.tryLock(3000)) throw new Error("Hệ thống đang bận.");
  try{
    const data=certSheet.getDataRange().getValues();
    const headers=normalizeHeaders(data[0]);
    const idCol=headers.indexOf('id');
    const nameCol=headers.indexOf('name');
    const imageCol=headers.indexOf('image');

    for(let i=data.length-1;i>0;i--){
      if(data[i][idCol]==id){
        
        if (modifiedByUserId) {
            try {
              var logSheet = ss.getSheetByName("Log");
              logSheet.appendRow([new Date(), modifiedByUserId, "N/A", 'xóa', data[i][idCol], data[i][nameCol], data[i][imageCol]]);
            } catch (e) { Logger.log("Lỗi ghi log (non-critical): " + e.toString()); }
        }
        
        certSheet.deleteRow(i+1); 
        return id; 
      }
    }
    throw new Error("Không tìm thấy chứng chỉ để xóa.");
  }finally{ lock.releaseLock(); }
}

function handleUpdateCertificateOrientation(id, orientation) {
  const lock=LockService.getScriptLock();
  if(!lock.tryLock(3000)) throw new Error("Hệ thống đang bận.");
  try{
    ensureCertOrientationColumn();
    const data = certSheet.getDataRange().getValues();
    const headers = normalizeHeaders(data[0]);
    const idCol = headers.indexOf('id');
    const orientCol = headers.indexOf('imageorientation');
    
    for (let i = 1; i < data.length; i++) {
      if (data[i][idCol] == id) {
        certSheet.getRange(i + 1, orientCol + 1).setValue(orientation);
        const updatedCert = sheetToObjects(certSheet).find(c => c.id == id);
        return updatedCert;
      }
    }
    throw new Error("Không tìm thấy chứng chỉ để cập nhật hướng xoay.");
  } finally {
    lock.releaseLock();
  }
}

// ===================================================================================
// ⚙️ CÀI ĐẶT HỆ THỐNG
// ===================================================================================
function handleUpdateComplianceYear(payload) {
  const { year } = payload;
  if (!year || isNaN(parseInt(year, 10))) {
    throw new Error("Năm không hợp lệ.");
  }
  
  const lock = LockService.getScriptLock();
  if (!lock.tryLock(3000)) {
    throw new Error("Hệ thống đang bận, vui lòng thử lại.");
  }

  try {
    let settingsSheet = ss.getSheetByName("Settings");
    if (!settingsSheet) {
      settingsSheet = ss.insertSheet("Settings");
      settingsSheet.getRange("A1:B1").setValues([['complianceStartYear', '']]);
    }
    
    settingsSheet.getRange("B1").setValue(parseInt(year, 10));
    
    return { newYear: parseInt(year, 10) };
  } finally {
    lock.releaseLock();
  }
}

// ===================================================================================
// 📊 REPORTING
// ===================================================================================
function handleGetUsersForReport() {
  const cache = CacheService.getScriptCache();
  const key = "report_users_v1";
  const cached = cache.get(key);
  if (cached) return JSON.parse(cached);

  Logger.log("🔄 Đọc dữ liệu người dùng cho báo cáo...");

  const users = sheetToObjects(userSheet);
  const reportUsers = users
    .filter(u => u.role !== 'admin' && u.role !== 'reporter' && String(u['trạngthái']).trim() !== 'Tạm ngừng')
    .map(u => ({ id: u.id, name: u.name, department: u.department }));

  const s = JSON.stringify(reportUsers);
  if (s.length < 100 * 1024) cache.put(key, s, 300); // Cache for 5 minutes

  return reportUsers;
}

function handleCreateReport(p) {
  const { title, content } = p;
  if (!title || !content) {
    throw new Error("Tiêu đề và nội dung là bắt buộc.");
  }
  let reportSheet = ss.getSheetByName("Reports");
  if (!reportSheet) {
    reportSheet = ss.insertSheet("Reports");
    reportSheet.appendRow(['id', 'title', 'content', 'createdAt']);
  }
  
  const lock = LockService.getScriptLock();
  if (!lock.tryLock(3000)) throw new Error("Hệ thống bận, vui lòng thử lại.");

  try {
    const id = Utilities.getUuid();
    const createdAt = new Date().toISOString();
    reportSheet.appendRow([id, title, content, createdAt]);
    return { id: id };
  } finally {
    lock.releaseLock();
  }
}

function handleGetReport(id) {
  let reportSheet = ss.getSheetByName("Reports");
  if (!reportSheet) {
    throw new Error("Không tìm thấy dữ liệu báo cáo.");
  }
  const reports = sheetToObjects(reportSheet);
  const report = reports.find(r => r.id === id);
  if (!report) {
    throw new Error("Không tìm thấy báo cáo với ID đã cho.");
  }
  return { title: report.title, content: report.content };
}

// 🤖 AI + GEMINI / DEEPSEEK
// ===================================================================================

function _callApi(url, options, apiName) {
  const res = UrlFetchApp.fetch(url, options);
  const responseCode = res.getResponseCode();
  const content = res.getContentText();

  if (responseCode >= 400) {
    let errorMessage = `Lỗi không xác định từ ${apiName} API. Mã lỗi: ${responseCode}.`;
    try {
      const errorJson = JSON.parse(content);
      const errorDetails = errorJson.error || {};
      const messageText = errorDetails.message || errorJson.message || '';

      if (apiName === 'Google Gemini' && responseCode === 429) {
        throw new Error("Hạn ngạch AI của Google trong ngày đã hết.");
      }
      if (messageText.toLowerCase().includes("api key not valid")) {
        throw new Error("API key không hợp lệ. Vui lòng kiểm tra lại.");
      }
      errorMessage = `Lỗi từ ${apiName} API: ${messageText || content}`;
    } catch (e) {
      if (e.message.includes("Hạn ngạch") || e.message.includes("API key")) throw e;
      errorMessage = `Lỗi phân tích phản hồi từ ${apiName} API (Mã lỗi: ${responseCode}): ${content}`;
    }
    throw new Error(errorMessage);
  }
  return JSON.parse(content);
}

function _callGeminiForExtraction(imageBase64, imageType, apiKey) {
  if (!apiKey) throw new Error("Google API key is missing for the Gemini call.");

  const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey;
  const promptText = `Bạn là một chuyên gia trích xuất dữ liệu từ hình ảnh chứng chỉ. Nhiệm vụ của bạn là đọc hình ảnh và trả về một đối tượng JSON với các trường sau:
- "name": Tên của khóa học hoặc chương trình đào tạo.
- "date": Ngày cấp chứng chỉ, định dạng YYYY-MM-DD.
- "credits": Tổng số tiết học hoặc tín chỉ. Chỉ lấy số.

**CÁC QUY TẮC BẮT BUỘC:**
1.  **KHÔNG LẤY TÊN NGƯỜI:** Tên chứng chỉ TUYỆT ĐỐI KHÔNG PHẢI là tên người. Bỏ qua các tên riêng như "Ông Nguyễn Văn A" hoặc "Bà Trần Thị B".

function callAIForExtraction(imageBase64, imageType) {
  const primaryKey = PropertiesService.getScriptProperties().getProperty('GOOGLE_API_KEY');
  
  if (primaryKey) {
    try {
      Logger.log("Đang thử trích xuất bằng API key chính (GOOGLE_API_KEY)...");
      return _callGeminiForExtraction(imageBase64, imageType, primaryKey);
    } catch (e) {
      Logger.log("Lỗi với API key chính: " + e.message);
      // Chỉ thử lại với key dự phòng nếu lỗi là do hạn ngạch
      if (e.message.includes("Hạn ngạch")) {
        Logger.log("Hạn ngạch của key chính đã hết. Chuyển sang key dự phòng...");
      } else {
        // Với các lỗi khác (key sai, v.v.), báo lỗi ngay
        throw e;
      }
    }
  } else {
     Logger.log("API key chính (GOOGLE_API_KEY) không được cấu hình. Chuyển sang key dự phòng.");
  }
  
  // Logic dự phòng
  const secondaryKey = PropertiesService.getScriptProperties().getProperty('API_KEY');
  if (!secondaryKey) {
    throw new Error("Cả hai API key của Google (chính và dự phòng) đều chưa được cấu hình.");
  }

  Logger.log("Đang thử trích xuất bằng API key dự phòng (API_KEY)...");
  try {
    return _callGeminiForExtraction(imageBase64, imageType, secondaryKey);
  } catch (e) {
    Logger.log("Lỗi với API key dự phòng: " + e.message);
    throw new Error("Trích xuất thất bại trên cả hai API key. Lỗi cuối cùng: " + e.message);
  }
}


function handleExtractCertificateInfo(p){
    if (!p.imageBase64 || !p.imageType) throw new Error("Thiếu dữ liệu ảnh.");
    return callAIForExtraction(p.imageBase64, p.imageType);
}

function handleExtractFromImageId(p) {
  if (!p.imageId) throw new Error("Thiếu ID hình ảnh.");
  try {
    const file = DriveApp.getFileById(p.imageId);
    const imageBlob = file.getBlob();
    const imageBytes = imageBlob.getBytes();
    if (imageBytes.length > 10 * 1024 * 1024) throw new Error("Tệp hình ảnh quá lớn (>10MB).");
    
    const imageType = imageBlob.getContentType();
    if (!imageType || !imageType.startsWith('image/')) throw new Error("Tệp không phải là định dạng hình ảnh được hỗ trợ.");
    
    const base64Data = Utilities.base64Encode(imageBytes);
    return callAIForExtraction(base64Data, imageType);
  } catch (e) {
    Logger.log("Lỗi khi lấy ảnh từ Drive ID (" + p.imageId + "): " + e.toString());
    const msg = e.message ? e.message.toLowerCase() : '';
    if (msg.includes('not found') || msg.includes('no item with id')) throw new Error("Không tìm thấy tệp hình ảnh. Tệp có thể đã bị xóa khỏi Google Drive.");
    if (msg.includes('permission') || msg.includes('access denied')) throw new Error("Không có quyền truy cập vào tệp hình ảnh.");
    throw new Error("Không thể tải hoặc xử lý ảnh từ Google Drive. Chi tiết: " + e.message);
  }
}

function handleCheckExtractionApiKey(payload) {
  const { keyName } = payload;
  let apiKey, keyLabel, propName;

  if (keyName === 'primary') {
    propName = 'GOOGLE_API_KEY';
    keyLabel = 'Google AI API (Chính)';
  } else if (keyName === 'secondary') {
    propName = 'API_KEY';
    keyLabel = 'Google AI API (Dự phòng)';
  } else {
    throw new Error("Tên key không hợp lệ.");
  }

  apiKey = PropertiesService.getScriptProperties().getProperty(propName);
  if (!apiKey) throw new Error(keyLabel + " chưa được cấu hình trên máy chủ.");
    
  const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey;
  const body = { contents: [{ parts: [{ text: "hi" }] }] };
  const options = { method: 'post', contentType: 'application/json', payload: JSON.stringify(body), muteHttpExceptions: true };
    
  _callApi(url, options, 'Google Gemini'); // This will throw an error on failure
  return { message: "Kết nối thành công. " + keyLabel + " đang hoạt động và còn hạn ngạch." };
}

function handleCheckAssistantApiKey() {
  const apiKey = PropertiesService.getScriptProperties().getProperty('DEEPSEEK_API_KEY');
  const keyLabel = 'DeepSeek AI (Trợ lý)';
  if (!apiKey) throw new Error(keyLabel + " chưa được cấu hình trên máy chủ.");

  const url = 'https://api.deepseek.com/v1/chat/completions';
  const body = { model: "deepseek-chat", messages: [{ "role": "user", "content": "hi" }], max_tokens: 5 };
  const options = { method: 'post', contentType: 'application/json', payload: JSON.stringify(body), headers: { 'Authorization': 'Bearer ' + apiKey }, muteHttpExceptions: true };

  _callApi(url, options, 'DeepSeek'); // This will throw an error on failure
  return { message: "Kết nối thành công. " + keyLabel + " đang hoạt động." };
}

function handleAskAI(p) {
  const DEEPSEEK_API_KEY = PropertiesService.getScriptProperties().getProperty('DEEPSEEK_API_KEY');
  if (!DEEPSEEK_API_KEY) throw new Error("Tính năng Trợ lý AI yêu cầu DeepSeek API Key (DEEPSEEK_API_KEY) phải được cấu hình.");

  const url = 'https://api.deepseek.com/v1/chat/completions';
  const context = 'Bạn là trợ lý AI phân tích dữ liệu đào tạo nhân sự.\nDữ liệu được cung cấp gồm ' + p.users.length + ' người dùng và ' + p.certificates.length + ' chứng chỉ.\nHãy trả lời câu hỏi của người dùng một cách ngắn gọn, súc tích bằng tiếng Việt dựa trên dữ liệu này.';

  const body = {
    model: "deepseek-chat",
    messages: [
      { "role": "system", "content": context },
      { "role": "user", "content": p.userMessage }
    ]
  };

  const options = {
    method: 'post',
    contentType: 'application/json',
    payload: JSON.stringify(body),
    headers: { 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
    muteHttpExceptions: true
  };

  const data = _callApi(url, options, 'DeepSeek');
  const ans = data?.choices?.[0]?.message?.content || "Xin lỗi, tôi không thể tạo phản hồi vào lúc này.";
  return ans;
}
